services:
  db:
    ports: !reset []

  discovery_mdns:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
    command: ["python", "-m", "scripts.publish_mdns_alias"]
    profiles: ["discovery-mdns"]
    restart: always
    network_mode: host
    environment:
      MDNS_HOSTNAME: ${DISCOVERY_MDNS_HOSTNAME:-}
      MDNS_ADVERTISED_IPS: ${DISCOVERY_MDNS_ADVERTISED_IPS:-}
      MDNS_DISCOVERY_PORT: ${DISCOVERY_MDNS_DISCOVERY_PORT:-8000}
      MDNS_WEBAPP_PORT: ${DISCOVERY_MDNS_WEBAPP_PORT:-3000}
    depends_on:
      server:
        condition: service_healthy
