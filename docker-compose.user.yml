# Zero-config end-user self-hosted stack for E-Connect.
# Quick start:
#   docker compose -f docker-compose.user.yml up -d
#
# Optional overrides may still be supplied through a local `.env`, but the
# default experience does not require any configuration changes.
# The primary user-facing WebUI entrypoint is https://localhost:3443.

services:
  db:
    image: docker.io/library/mariadb:10.11
    pull_policy: always
    container_name: e-connect-db
    restart: always
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-econnect_root_password}
      MYSQL_DATABASE: ${DB_NAME:-e_connect_db}
      MYSQL_USER: ${DB_USER:-econnect}
      MYSQL_PASSWORD: ${DB_PASSWORD:-econnect_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: ${ECONNECT_MQTT_IMAGE:-docker.io/ryzen30xx/econnect-mqtt:latest}
    pull_policy: always
    container_name: e-connect-mqtt
    restart: always
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "1883:1883"

  server:
    image: ${ECONNECT_SERVER_IMAGE:-docker.io/ryzen30xx/econnect-server:latest}
    pull_policy: always
    container_name: e-connect-server
    restart: always
    ports:
      - "80:8000"
      - "8000:8000"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      DATABASE_URL: mysql+pymysql://${DB_USER:-econnect}:${DB_PASSWORD:-econnect_password}@${DB_HOST:-db}:3306/${DB_NAME:-e_connect_db}
      SECRET_KEY: ${SECRET_KEY:-econnect_secret_key_change_me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-43200}
      MQTT_BROKER: ${MQTT_BROKER:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_NAMESPACE: ${MQTT_NAMESPACE:-local}
      FIRMWARE_PUBLIC_BASE_URL: ${FIRMWARE_PUBLIC_BASE_URL:-}
      FIRMWARE_PUBLIC_SCHEME: ${FIRMWARE_PUBLIC_SCHEME:-http}
      FIRMWARE_PUBLIC_PORT: ${FIRMWARE_PUBLIC_PORT:-3000}
      FIRMWARE_MQTT_BROKER: ${FIRMWARE_MQTT_BROKER:-}
      MDNS_HOSTNAME: ${MDNS_HOSTNAME:-}
      MDNS_ADVERTISED_IPS: ${MDNS_ADVERTISED_IPS:-}
      MDNS_DISCOVERY_PORT: ${MDNS_DISCOVERY_PORT:-8000}
      MDNS_WEBAPP_PORT: ${MDNS_WEBAPP_PORT:-3443}
      HOST_OS_ROOT: /hostfs
    volumes:
      - server_data:/data
      # Optional host storage visibility for the System Health screen.
      # Uncomment only if you want the dashboard to show real host disk limits.
      # - /:/hostfs:ro
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json, urllib.request; data = json.loads(urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5).read().decode()); assert data.get("status") == "ok"
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

  webapp:
    image: ${ECONNECT_WEBAPP_IMAGE:-docker.io/ryzen30xx/econnect-webapp:latest}
    pull_policy: always
    container_name: e-connect-webapp
    restart: always
    ports:
      - "3000:3000"
      - "3443:3443"
    volumes:
      - webapp_tls:/app/.local-https
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      ALLOW_INSECURE_HTTP: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://server:8000}
      HTTPS_HOSTS: ${HTTPS_HOSTS:-localhost,econnect.local,e-connect.local}
      HTTPS_IPS: ${HTTPS_IPS:-}
      HTTPS_PORT: 3443
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const main = async () => { const res = await fetch("http://127.0.0.1:3000/login"); if (!res.ok) process.exit(1); }; main().catch(() => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

  discovery_mdns:
    image: ${ECONNECT_SERVER_IMAGE:-docker.io/ryzen30xx/econnect-server:latest}
    pull_policy: always
    command: ["python", "-m", "scripts.publish_mdns_alias"]
    profiles: ["discovery-mdns"]
    restart: always
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      MDNS_HOSTNAME: ${DISCOVERY_MDNS_HOSTNAME:-econnect.local}
      MDNS_ADVERTISED_IPS: ${DISCOVERY_MDNS_ADVERTISED_IPS:-}
      MDNS_DISCOVERY_PORT: ${DISCOVERY_MDNS_DISCOVERY_PORT:-8000}
      MDNS_WEBAPP_PORT: ${DISCOVERY_MDNS_WEBAPP_PORT:-3443}
    depends_on:
      server:
        condition: service_healthy

volumes:
  db_data:
  server_data:
  webapp_tls:
