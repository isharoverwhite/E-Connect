; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:dfrobot_beetle_esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
build_flags =
    -D ECONNECT_BOARD_PROFILE=\"esp8266\"
    ; Keep secrets and deployment-specific values out of Git.
    ; Uncomment local overrides only in your private workspace, or rely on
    ; include/generated_firmware_config.h when the server stamps a build job.
    ; -D WIFI_SSID=\"YOUR_WIFI_SSID\"
    ; -D WIFI_PASS=\"YOUR_WIFI_PASSWORD\"
    ; -D MQTT_BROKER=\"192.168.1.10\"
    ; -D MQTT_NAMESPACE=\"local\"
    ; -D ECONNECT_PROJECT_ID=\"your-project-id\"
    ; -D ECONNECT_SECRET_KEY=\"your-device-secret\"
    ; -D ECONNECT_DEVICE_ID=\"your-device-id\"
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
monitor_speed = 115200

[env:jc3827w543]
platform = espressif32
board = jc3827w543
framework = arduino
build_flags =
    -D BOARD_JC3827W543=1
    -D LV_CONF_SKIP=1
    -I src/display_ui
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
    lovyan03/LovyanGFX@^1.1.12
    lvgl/lvgl@^9.1.0
    TAMC_GT911
monitor_speed = 115200
