<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Control Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; background-color: #007bff; color: white; border: none; }
        button:hover { background-color: #0056b3; }
        .status { margin-top: 10px; font-weight: bold; }
        .log { background: #f0f0f0; padding: 10px; height: 150px; overflow-y: scroll; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🕹 Device Remote Control</h1>
    
    <div class="card">
        <h3>1. Authentication</h3>
        <input type="text" id="username" placeholder="Username (admin)" value="admin">
        <input type="password" id="password" placeholder="Password" value="securepassword">
        <button onclick="login()">Login</button>
        <div id="authStatus" class="status">Not Logged In</div>
    </div>

    <div class="card">
        <h3>2. Control Device</h3>
        <input type="text" id="deviceId" placeholder="Device UUID (Check Serial Monitor)" value="">
        <button onclick="checkLatest()">Check Connection (Get Latest)</button>
        <br><br>
        <button style="background: #28a745;" onclick="sendCommand('on')">Turn ON (LED)</button>
        <button style="background: #dc3545;" onclick="sendCommand('off')">Turn OFF (LED)</button>
    </div>

    <div class="card">
        <h3>Log output</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        let token = "";
        const API_URL = "http://localhost:8000/api/v1";

        function log(msg) {
            const div = document.getElementById('log');
            div.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + div.innerHTML;
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const formData = new URLSearchParams();
            formData.append('username', user);
            formData.append('password', pass);

            try {
                const res = await fetch(`${API_URL}/auth/token`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    document.getElementById('authStatus').innerText = "✅ Logged In";
                    document.getElementById('authStatus').style.color = "green";
                    log("Login successful");
                } else {
                    throw new Error(data.detail);
                }
            } catch (e) {
                document.getElementById('authStatus').innerText = "❌ Error: " + e.message;
                document.getElementById('authStatus').style.color = "red";
                log("Login failed: " + e.message);
            }
        }

        async function sendCommand(action) {
            if (!token) return alert("Please login first");
            const deviceId = document.getElementById('deviceId').value;
            if (!deviceId) return alert("Enter Device ID");

            log(`Sending '${action}' to ${deviceId}...`);

            try {
                const res = await fetch(`${API_URL}/device/${deviceId}/command`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action: action })
                });
                const data = await res.json();
                if (res.ok) {
                    log("✅ Command Sent: " + JSON.stringify(data));
                } else {
                    log("❌ Send Failed: " + JSON.stringify(data));
                }
            } catch (e) {
                log("❌ Network Error: " + e.message);
            }
        }

        async function checkLatest() {
            const deviceId = document.getElementById('deviceId').value;
            if (!deviceId) return alert("Enter Device ID");

            try {
                // This endpoint doesn't require auth in our implementation (public polling)
                // If it does, add header.
                const res = await fetch(`${API_URL}/device/${deviceId}/command/latest`);
                const data = await res.json();
                log("Latest State: " + JSON.stringify(data));
            } catch (e) {
                log("❌ Check Failed: " + e.message);
            }
        }
    </script>
</body>
</html>
