services:
  db:
    image: mariadb:10.11
    container_name: e-connect-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-e_connect_db}
      MYSQL_USER: ${DB_USER:-econnect}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    build:
      context: ./mqtt
      dockerfile: Dockerfile
    image: econnect-mqtt
    container_name: e-connect-mqtt
    restart: always
    ports:
      - "1883:1883"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: e-connect-server
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-econnect}:${DB_PASSWORD:-root_password}@${DB_HOST:-db}:3306/${DB_NAME:-e_connect_db}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-43200}
      MQTT_BROKER: ${MQTT_BROKER:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_NAMESPACE: ${MQTT_NAMESPACE:-local}
      FIRMWARE_PUBLIC_BASE_URL: ${FIRMWARE_PUBLIC_BASE_URL:-}
    volumes:
      - server_data:/data
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json, urllib.request; data = json.loads(urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5).read().decode()); assert data.get("status") == "ok"
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://server:8000}
    container_name: e-connect-webapp
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - webapp_tls:/app/.local-https
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://server:8000}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - process.env.NODE_TLS_REJECT_UNAUTHORIZED = "0"; const main = async () => { const res = await fetch("https://127.0.0.1:3000/login"); if (!res.ok) process.exit(1); }; main().catch(() => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

volumes:
  db_data:
  server_data:
  webapp_tls:
