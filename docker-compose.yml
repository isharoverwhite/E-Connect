services:
  db:
    image: mariadb:10.11
    container_name: e-connect-db
    restart: always
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-e_connect_db}
      MYSQL_USER: ${DB_USER:-econnect}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    build:
      context: ./mqtt
      dockerfile: Dockerfile
    image: econnect-mqtt
    container_name: e-connect-mqtt
    restart: always
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "1883:1883"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: e-connect-server
    restart: always
    ports:
      # Host port 8000 serves the redirect root, /health, /web-assistant.js,
      # and /discovery-bridge without claiming host port 80.
      - "8000:8000"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      DATABASE_URL: mysql+pymysql://${DB_USER:-econnect}:${DB_PASSWORD:-root_password}@${DB_HOST:-db}:3306/${DB_NAME:-e_connect_db}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-43200}
      # Keep the runtime client pointed at a stable alias even though the broker
      # defaults to the in-stack broker alias. Use the host-network override when
      # Mosquitto must bind directly on the Docker host.
      MQTT_BROKER: ${MQTT_BROKER:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_NAMESPACE: ${MQTT_NAMESPACE:-local}
      FIRMWARE_PUBLIC_BASE_URL: ${FIRMWARE_PUBLIC_BASE_URL:-}
      FIRMWARE_PUBLIC_SCHEME: ${FIRMWARE_PUBLIC_SCHEME:-http}
      FIRMWARE_PUBLIC_PORT: ${FIRMWARE_PUBLIC_PORT:-3000}
      FIRMWARE_MQTT_BROKER: ${FIRMWARE_MQTT_BROKER:-}
      MDNS_HOSTNAME: ${MDNS_HOSTNAME:-}
      MDNS_ADVERTISED_IPS: ${MDNS_ADVERTISED_IPS:-}
      MDNS_DISCOVERY_PORT: ${MDNS_DISCOVERY_PORT:-8000}
      MDNS_WEBAPP_PORT: ${MDNS_WEBAPP_PORT:-3443}
      HOST_OS_ROOT: /hostfs
    volumes:
      - server_data:/data
      # To monitor the real host's storage limits from the System Health dashboard, uncomment the line below.
      # Make sure to leave 'ro' to keep the container from modifying host files.
      # - /:/hostfs:ro
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json, urllib.request; data = json.loads(urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5).read().decode()); assert data.get("status") == "ok"
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://server:8000}
    container_name: e-connect-webapp
    restart: always
    ports:
      - "3000:3000"
      - "3443:3443"
    volumes:
      - webapp_tls:/app/.local-https
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      ALLOW_INSECURE_HTTP: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://server:8000}
      HTTPS_HOSTS: ${HTTPS_HOSTS:-}
      HTTPS_IPS: ${HTTPS_IPS:-}
      HTTPS_PORT: 3443
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const main = async () => { const res = await fetch("http://127.0.0.1:3000/login"); if (!res.ok) process.exit(1); }; main().catch(() => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

  discovery_mdns:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
    command: ["python", "-m", "scripts.publish_mdns_alias"]
    profiles: ["discovery-mdns"]
    restart: always
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      MDNS_HOSTNAME: ${DISCOVERY_MDNS_HOSTNAME:-}
      MDNS_ADVERTISED_IPS: ${DISCOVERY_MDNS_ADVERTISED_IPS:-}
      MDNS_DISCOVERY_PORT: ${DISCOVERY_MDNS_DISCOVERY_PORT:-8000}
      MDNS_WEBAPP_PORT: ${DISCOVERY_MDNS_WEBAPP_PORT:-3443}
    depends_on:
      server:
        condition: service_healthy

  find_website:
    build:
      context: ./find_website
      dockerfile: Dockerfile
    image: econnect-find-website
    container_name: e-connect-find-website
    restart: always
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${FIND_WEBSITE_PORT:-9123}:9123"
    depends_on:
      server:
        condition: service_healthy

volumes:
  db_data:
  server_data:
  webapp_tls:
