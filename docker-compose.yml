services:
  db:
    image: mariadb:10.11
    container_name: e-connect-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-smart_home}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: e-connect-mqtt
    restart: always
    ports:
      - "1883:1883"
    command: mosquitto -c /mosquitto-no-auth.conf
    volumes:
      - ./mosquitto.conf:/mosquitto-no-auth.conf

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: e-connect-server
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-user}:${DB_PASSWORD:-password}@${DB_HOST:-db}:3306/${DB_NAME:-smart_home}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-43200}
      MQTT_BROKER: ${MQTT_BROKER:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_NAMESPACE: ${MQTT_NAMESPACE:-local}
    volumes:
      - server_data:/data
    depends_on:
      db:
        condition: service_healthy

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://server:8000}
    container_name: e-connect-webapp
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://server:8000}
    depends_on:
      - server

volumes:
  db_data:
  server_data:
