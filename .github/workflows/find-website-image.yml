name: find-website-image

on:
  pull_request:
    paths:
      - "find_website/**"
      - ".github/workflows/find-website-image.yml"
  push:
    branches:
      - main
    paths:
      - "find_website/**"
      - ".github/workflows/find-website-image.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: find-website-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build find_website image
        uses: docker/build-push-action@v6
        with:
          context: ./find_website
          file: ./find_website/Dockerfile
          load: true
          tags: econnect-find-website:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke check container
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            docker stop find-website-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d --rm \
            --name find-website-ci \
            -p 19123:9123 \
            econnect-find-website:ci-${GITHUB_SHA}

          for attempt in $(seq 1 20); do
            if curl -fsSI http://127.0.0.1:19123/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs find-website-ci
          exit 1
