name: end-user-images

on:
  pull_request:
    paths:
      - "server/**"
      - "webapp/**"
      - "mqtt/**"
      - ".github/workflows/end-user-images.yml"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "webapp/**"
      - "mqtt/**"
      - ".github/workflows/end-user-images.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: end-user-images-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: docker.io
  IMAGE_NAMESPACE: ryzen30xx

jobs:
  docker-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: server
            context: ./server
            file: ./server/Dockerfile
            image: econnect-server
          - id: webapp
            context: ./webapp
            file: ./webapp/Dockerfile
            image: econnect-webapp
          - id: mqtt
            context: ./mqtt
            file: ./mqtt/Dockerfile
            image: econnect-mqtt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        if: github.event_name != 'pull_request'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo "Missing DOCKERHUB_USERNAME"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "Missing DOCKERHUB_TOKEN"; exit 1; }

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}
