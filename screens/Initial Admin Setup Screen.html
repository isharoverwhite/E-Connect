<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Initial Admin Setup Screen</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b86f7",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display flex flex-col min-h-screen">
<div class="flex-1 flex items-center justify-center p-4">
<div class="w-full max-w-[540px] flex flex-col gap-6">
<!-- Header Section -->
<div class="flex flex-col gap-2 text-center items-center">
<div class="h-16 w-16 bg-primary/20 text-primary rounded-xl flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl">dns</span>
</div>
<h1 class="text-slate-900 dark:text-white text-3xl font-black leading-tight tracking-tight">Create Administrator Account</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal max-w-md">This is a one-time setup. This account will have full administrative privileges.</p>
</div>
<!-- Form Card -->
<div class="bg-white dark:bg-[#1b2533] rounded-xl p-8 shadow-xl border border-slate-200 dark:border-slate-800">
<form class="flex flex-col gap-5">
<!-- Username Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-medium leading-normal">Username</label>
<div class="relative">
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-[#101722] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 h-12 px-4 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" placeholder="Choose a username" type="text" value=""/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-medium leading-normal">Email Address</label>
<div class="relative">
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-[#101722] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 h-12 px-4 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" placeholder="Enter email address" type="email" value=""/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-medium leading-normal">Password</label>
<div class="flex w-full items-center relative">
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-[#101722] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 h-12 px-4 pr-12 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" placeholder="Create a strong password" type="password" value=""/>
<button class="absolute right-0 h-full px-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-medium leading-normal">Confirm Password</label>
<div class="flex w-full items-center relative">
<input class="form-input w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-[#101722] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 h-12 px-4 pr-12 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" placeholder="Re-enter password" type="password" value=""/>
<button class="absolute right-0 h-full px-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Divider/Info -->
<div class="flex gap-3 items-start p-3 bg-primary/10 rounded-lg border border-primary/20 mt-2">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">info</span>
<p class="text-xs text-slate-600 dark:text-slate-300 leading-relaxed">
                            By clicking Initialize, you agree to become the super administrator for this instance. Please ensure you store your credentials securely.
                        </p>
</div>
<!-- Action Button -->
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-blue-600 transition-colors mt-2 shadow-lg shadow-blue-900/20">
<span class="truncate">Initialize Server</span>
</button>
</form>
</div>
<!-- Footer -->
<div class="flex justify-center items-center gap-2 text-slate-500 dark:text-slate-600 text-sm">
<span class="material-symbols-outlined text-lg">lock</span>
<span>Secure Local Environment</span>
</div>
</div>
</div>
</body></html>
