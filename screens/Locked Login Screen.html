<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Locked Login Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b86f7",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-[480px] bg-white dark:bg-[#1b2533] rounded-xl shadow-lg border border-slate-200 dark:border-slate-800 overflow-hidden relative">
<!-- Optional Decorative Top Bar/Gradient -->
<div class="h-2 w-full bg-gradient-to-r from-primary to-blue-400"></div>
<div class="p-8 md:p-10 flex flex-col gap-6">
<!-- Header Section -->
<div class="text-center space-y-2">
<div class="flex justify-center mb-4 text-primary">
<span class="material-symbols-outlined text-5xl">lock_person</span>
</div>
<h1 class="text-slate-900 dark:text-slate-50 text-3xl font-bold tracking-tight">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Enter your credentials to access the IoT dashboard</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-5">
<!-- Username Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-200 text-sm font-medium" for="username">Username or Email</label>
<div class="relative">
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-[#111926] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent h-12 pl-10 transition-colors" id="username" placeholder="admin@example.com" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-[20px]">person</span>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-900 dark:text-slate-200 text-sm font-medium" for="password">Password</label>
<a class="text-primary hover:text-blue-400 text-sm font-medium transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-[#111926] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent h-12 pl-10 pr-10 transition-colors" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-[20px]">lock</span>
<!-- Toggle Password Visibility Icon (Static) -->
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Checkbox -->
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-[#111926] text-primary focus:ring-2 focus:ring-primary focus:ring-offset-0 checked:border-primary checked:bg-primary transition-all" id="remember" type="checkbox"/>
<span class="pointer-events-none absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-white opacity-0 peer-checked:opacity-100">
<svg class="h-3.5 w-3.5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</span>
</div>
<label class="text-slate-600 dark:text-slate-400 text-sm cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-blue-600 active:bg-blue-700 text-white font-bold h-12 rounded-lg transition-colors flex items-center justify-center gap-2 mt-2 group">
<span>Sign In</span>
<span class="material-symbols-outlined group-hover:translate-x-0.5 transition-transform text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer / System Status (Subtle) -->
<div class="pt-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-center gap-2">
<div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
<span class="text-xs text-slate-500 dark:text-slate-500 font-medium">System Operational v2.4.0</span>
</div>
</div>
</div>
</body></html>
